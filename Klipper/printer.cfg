[include mainsail.cfg]

# Max3D — CoreXY 320x320x300
# Board: BTT SKR Mini E3 V3.0 (STM32G0B1)
# Host: Orange Pi Zero2W — UART5 (PH2/PH3) → MCU UART 250000

[mcu]
serial: /dev/ttyS5
baud: 250000
restart_method: command

[delayed_gcode report_mcu_temp]
initial_duration: 2
gcode:
    {action_respond_info("MCU connected")}

[printer]
kinematics: corexy
max_velocity: 150
max_accel: 2000
max_z_velocity: 5
max_z_accel: 50

# --- Steppers -----------------------------------------------------------
[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 320
homing_speed: 50
second_homing_speed: 15
homing_retract_dist: 3

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 320
position_min: 0
position_max: 320
homing_speed: 50
second_homing_speed: 15
homing_retract_dist: 3
homing_positive_dir: true

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 2
endstop_pin: ^PC2
position_endstop: 0
position_min: 0
position_max: 300
homing_speed: 8
homing_retract_dist: 2

# --- TMC2209 UART (shared UART4, different addresses) -------------------

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
hold_current: 0.290
stealthchop_threshold: 999999

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
hold_current: 0.290
stealthchop_threshold: 999999

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
hold_current: 0.290
stealthchop_threshold: 999999

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.280
hold_current: 0.140
stealthchop_threshold: 999999

# --- Extruder ------------------------------------------------------------

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 7.822
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 27.00
#pid_Ki: 2.30
#pid_Kd: 79.50
min_temp: 5
max_temp: 275
min_extrude_temp: 170
max_extrude_only_distance: 200
pressure_advance: 0.0

# --- Heated Bed ----------------------------------------------------------

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 195.00
#pid_Ki: 37.43
#pid_Kd: 674.80
min_temp: 5
max_temp: 150

# --- Fans ----------------------------------------------------------------

[fan]
pin: PC6

[heater_fan hotend_fan]
pin: PC7
heater: extruder
heater_temp: 50.0

#[controller_fan board_fan]
#pin: PB15
#idle_timeout: 60

# --- Homing --------------------------------------------------------------

[safe_z_home]
home_xy_position: 3, 317
z_hop: 5
z_hop_speed: 8
speed: 80

# --- Bed Screws (manual leveling with paper) -----------------------------

[bed_screws]
screw1: 50, 85
screw1_name: front left
screw2: 270, 85
screw2_name: front right
screw3: 270, 235
screw3_name: rear right
screw4: 50, 235
screw4_name: rear left
screw5: 160, 160
screw5_name: center

# --- Filament Sensor -----------------------------------------------------

[filament_switch_sensor filament]
switch_pin: PC15
pause_on_runout: True
runout_gcode:
    PAUSE
    M117 Filament runout!

# --- Display (CR10 Stock 12864 LCD) --------------------------------------

[display]
lcd_type: st7920
cs_pin: PB8
sclk_pin: PB9
sid_pin: PD6
encoder_pins: ^PA9, ^PA10
click_pin: ^!PA15

[output_pin beeper]
pin: PB5
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001

# --- Misc ----------------------------------------------------------------

[idle_timeout]
timeout: 600

[force_move]
enable_force_move: True

[firmware_retraction]
retract_length: 0.8
retract_speed: 40
unretract_extra_length: 0
unretract_speed: 40

